    <h1>Admin Panel</h1>
    <h2>Add New Book</h2>
    <form id="bookForm">
        <div>
            <label for="fname">Book Title:</label>
            <input type="text" id="fname" name="fname"><br><br>
        </div>

        <div>
            <label for="lname">Book Author:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Book Publisher:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Publish Year:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Book Genre:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Book Copies Avaliable:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>
        
        <input class="formButton" type="submit" value="Submit">
    </form>

    <h2>Add New Member</h2>
    <form id="newMemberForm">
        <div>
            <label for="fname">Member Name:</label>
            <input type="text" id="fname" name="fname"><br><br>
        </div>

        <div>
            <label for="lname">Member Address:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Member Phone:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <div>
            <label for="lname">Member Email:</label>
            <input type="text" id="lname" name="lname"><br><br>
        </div>

        <input class="formButton" type="submit" value="Submit">

        
    </form>

    <script src="../resources/script.js"></script>
